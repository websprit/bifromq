# -- Number of BifroMQ replicas (cluster nodes)
replicaCount: 3

image:
  # -- Docker image repository
  repository: 192.168.75.185:5000/apache-bifromq
  # -- Docker image tag (defaults to Chart appVersion)
  tag: "perf-opt"
  # -- Image pull policy
  pullPolicy: Always

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Pod-level annotations
podAnnotations: {}

# -- Pod-level security context
# podSecurityContext:
#   sysctls:
#     - name: net.core.somaxconn
#       value: "65535"
#     - name: net.ipv4.tcp_tw_reuse
#       value: "1"
#     - name: net.ipv4.tcp_fastopen
#       value: "3"

# -- Container-level security context
securityContext: {}

# ============================================================
# BifroMQ Cluster Configuration
# ============================================================
clusterConfig:
  # -- Cluster environment name. Nodes with the same env can communicate.
  env: "Production"
  # -- Cluster communication port (used for membership protocol)
  port: 8899

# ============================================================
# MQTT Service Configuration
# ============================================================
mqtt:
  # -- MQTT TCP listener port
  tcpPort: 1883
  # -- Enable MQTT over TLS
  tlsEnabled: false
  # -- MQTT TLS listener port
  tlsPort: 1884
  # -- Enable MQTT over WebSocket
  wsEnabled: true
  # -- MQTT WebSocket listener port
  wsPort: 8080
  # -- WebSocket path
  wsPath: "/mqtt"

# ============================================================
# TLS Certificate Configuration
# ============================================================
tls:
  # -- Name of an existing K8s Secret containing TLS certificates.
  #    Leave empty to use auto-generated self-signed certificates.
  #    The Secret should contain: tls.crt, tls.key, and optionally ca.crt
  certSecretName: ""
  # -- Mount path inside the container for certificate files
  mountPath: "/home/bifromq/certs"
  # -- Certificate file name in the Secret (mapped to certFile in sslConfig)
  certFile: "tls.crt"
  # -- Private key file name in the Secret (mapped to keyFile in sslConfig)
  keyFile: "tls.key"
  # -- CA certificate file name in the Secret (mapped to trustCertsFile, optional for mTLS)
  trustCertsFile: "ca.crt"
  # -- Client authentication mode: NONE, OPTIONAL, or REQUIRE
  clientAuth: "NONE"

# ============================================================
# API Server Configuration
# ============================================================
apiServer:
  # -- Enable the HTTP API server
  enabled: true
  # -- HTTP API port
  port: 8091

# ============================================================
# Client-facing Service
# ============================================================
service:
  # -- Service type: ClusterIP, NodePort, or LoadBalancer
  type: ClusterIP
  # -- Annotations for the service (e.g. for cloud LB config)
  annotations: {}
  # -- External IPs to bind the service to (e.g. a node IP for direct access)
  externalIPs: []
  #  - 192.168.75.186

# ============================================================
# JVM Configuration
# ============================================================
jvm:
  # -- JVM heap options. Leave empty to use the built-in auto-calculation.
  heapOpts: ""
  # -- JVM GC options. Optimized for JDK 25 ZGC (sub-millisecond pauses).
  gcOpts: "-XX:+UseZGC -XX:ZAllocationSpikeTolerance=3 -Xlog:async -Xlog:gc*:file=/home/bifromq/logs/gc-%t.log:time,tid,tags:filecount=5,filesize=50m -XX:+CrashOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/home/bifromq/logs"
  # -- Extra JVM options
  extraOpts: "-XX:+UseCompactObjectHeaders"
  # -- Memory limit override for JVM auto-calculation (in bytes).
  #    If empty, the container memory limit is used.
  memLimit: ""

# ============================================================
# RocksDB Engine Configuration
# ============================================================
engineConfig:
  # -- Enable write group commit for WAL engines.
  #    Reduces WAL syncs under concurrent writes, improving throughput ~2x.
  #    Set to false if you encounter issues.
  groupCommit: true


# ============================================================
# Persistence (RocksDB data directory)
# ============================================================
persistence:
  # -- Enable persistent storage via PVC
  enabled: true
  # -- Storage class name (empty = default StorageClass)
  storageClass: ""
  # -- PVC access modes
  accessModes:
    - ReadWriteOnce
  # -- Volume size for each node's data
  size: 10Gi
  # -- Annotations for PVCs
  annotations: {}

# ============================================================
# Resource Requests & Limits
# ============================================================
resources:
  requests:
    cpu: "4"
    memory: "8Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

# ============================================================
# Node Scheduling
# ============================================================
# -- Node selector labels
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}

# ============================================================
# Extra environment variables
# ============================================================
# -- Additional environment variables for the BifroMQ container
extraEnv: []
#  - name: MY_VAR
#    value: "my-value"

# ============================================================
# BifroMQ Plugin Configuration
# ============================================================
plugin:
  # -- Auth provider fully-qualified class name
  authProviderFQN: ""
  # -- Resource throttler fully-qualified class name
  resourceThrottlerFQN: ""
  # -- Setting provider fully-qualified class name
  settingProviderFQN: ""
